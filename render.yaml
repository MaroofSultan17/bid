services:
  - type: web
    name: taskbid-backend
    env: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run migrate && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskbid-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskbid-redis
          property: connectionString

  - type: web
    name: taskbid-frontend
    env: static
    plan: free
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=0, no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://taskbid-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: taskbid-db
    plan: free

redis:
  - name: taskbid-redis
    plan: free
