version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskbid
      POSTGRES_USER: taskbid
      POSTGRES_PASSWORD: secret
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine

  backend:
    build: { context: ./apps/backend, dockerfile: Dockerfile }
    environment:
      DATABASE_URL: postgres://taskbid:secret@postgres:5432/taskbid
      REDIS_URL: redis://redis:6379
      PORT: 3001

  frontend:
    build: { context: ./apps/frontend, dockerfile: Dockerfile }
    ports: ["80:80"]
    depends_on: [backend]

volumes:
  pgdata:
